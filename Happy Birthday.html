<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 Birthday Surprise Template</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

input[type="file"]{display:none !important;visibility:hidden !important;position:absolute !important;width:0 !important;height:0 !important;overflow:hidden !important;}

body{
  font-family:'Nunito',sans-serif;
  background:#fff;
  overflow:hidden;
  width:100vw;
  height:100vh;
  height:100dvh;
}

/* ── ALL SCREENS ── */
.screen{
  display:none;
  width:100vw;
  height:100vh;
  height:100dvh;
  position:fixed;
  top:0;left:0;
  animation:fadeIn 0.4s ease;
  overflow:hidden;
}
.screen.active{display:flex;}

@keyframes fadeIn{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}

/* ── SCREEN 1 — PASSCODE ── */
#s1{
  flex-direction:row;
  background:#fce4ec;
}
.s1-left{
  flex:1;
  background:#f8bbd0;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.scatter{position:absolute;inset:0;pointer-events:none;}
.scatter span{position:absolute;color:#c2185b;font-size:13px;opacity:0.3;}

.oval-wrap{
  position:relative;z-index:2;
  width:220px;height:260px;
  display:flex;align-items:center;justify-content:center;
}
.oval-frame{
  width:200px;height:240px;
  border-radius:50%;background:white;
  box-shadow:0 0 0 5px #f48fb1,0 0 0 9px white,0 0 0 13px #f48fb1;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;
}
.oval-frame img{width:100%;height:100%;object-fit:cover;}

.heart-ring{position:absolute;inset:-20px;border-radius:50%;z-index:1;}
.heart-ring span{position:absolute;top:50%;left:50%;font-size:11px;color:#e91e8c;opacity:0.65;}

.s1-right{
  flex:1;background:#fce4ec;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;padding:30px 20px;
}
.pc-label{font-family:'Caveat',cursive;font-size:1.7rem;color:#c2185b;font-weight:700;}
.pc-boxes{display:flex;gap:10px;}
.pc-box{
  width:52px;height:52px;
  border:2.5px solid #e91e8c;border-radius:10px;background:white;
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;color:#e91e8c;transition:background 0.15s;
}
.pc-box.on{background:#f8bbd0;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:195px;}
.key{
  height:54px;border:none;border-radius:50%;
  background:white;color:#c2185b;font-size:1.3rem;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;
  box-shadow:0 3px 10px rgba(233,30,140,0.18);
  transition:all 0.12s;user-select:none;
}
.key:hover{background:#f8bbd0;transform:scale(1.08);}
.key:active{transform:scale(0.92);}
.unlock-btn{
  display:none;background:white;color:#e91e8c;
  border:2.5px solid #e91e8c;padding:10px 40px;
  border-radius:30px;font-size:1rem;font-weight:900;
  font-family:'Nunito',sans-serif;cursor:pointer;transition:all 0.2s;
}
.unlock-btn:hover{background:#e91e8c;color:white;}

/* ── SHARED SLIDE SCREENS ── */
.slide{
  flex-direction:column;align-items:center;justify-content:center;
  background:white;gap:18px;padding:24px 20px;
  text-align:center;position:relative;overflow:hidden;
}
.glow{
  position:absolute;
  width:min(420px,90vw);height:min(420px,90vw);
  background:radial-gradient(circle,#fce4ec 0%,transparent 68%);
  border-radius:50%;top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none;z-index:0;
}
.slide > *{position:relative;z-index:1;}

.big-red{
  font-family:'Caveat',cursive;
  font-size:clamp(1.5rem,5vw,3rem);
  color:#c2185b;font-weight:700;line-height:1.35;
}
.action-btn{
  background:#c2185b;color:white;border:none;
  padding:14px 48px;border-radius:30px;
  font-size:1rem;font-weight:900;font-family:'Nunito',sans-serif;
  cursor:pointer;box-shadow:0 4px 16px rgba(194,24,91,0.35);
  transition:all 0.2s;user-select:none;
}
.action-btn:hover{transform:scale(1.05);}
.action-btn.grey{background:#aaa;box-shadow:none;}
.action-btn.grey:hover{background:#888;transform:scale(1.03);}
.yn-row{display:flex;gap:18px;}

/* shrink SVG illustrations to always fit screen */
.slide svg, #s7 svg, #s8 svg{
  max-width:min(90vw, 100%);
  max-height:35vh;
  width:auto;
  height:auto;
}

@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

/* ── SCREEN 6 — WISH ── */
#s6{flex-direction:column;background:white;overflow:hidden;}
.wish-scroll{
  width:100%;height:100%;flex:1;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:28px 40px 90px;
}
.wish-top{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.wish-title{
  font-family:'Caveat',cursive;
  font-size:clamp(1.6rem,5vw,3rem);
  color:#c2185b;font-weight:700;
}
.wish-right{margin-left:auto;font-size:1.3rem;line-height:1.8;}
.wish-body{
  font-family:'Caveat',cursive;
  font-size:clamp(1rem,2.4vw,1.3rem);
  color:#333;line-height:2.15;
}
.wish-body p{margin-bottom:0.4em;}
.wish-body .rb{color:#c2185b;font-weight:700;}
.wish-next-btn{
  position:fixed;bottom:20px;right:24px;z-index:99;
  background:#c2185b;color:white;border:none;
  padding:11px 30px;border-radius:30px;
  font-size:0.9rem;font-weight:900;font-family:'Nunito',sans-serif;
  cursor:pointer;box-shadow:0 4px 16px rgba(194,24,91,0.35);display:none;
}

/* ── SCREEN 8 ── */
#s8{
  flex-direction:column;align-items:center;justify-content:center;
  background:white;gap:22px;padding:30px 20px;
  position:relative;overflow:hidden;
}
.star-bg{position:absolute;inset:0;pointer-events:none;}
.star-bg span{position:absolute;font-size:1.1rem;color:#e91e8c;opacity:0.25;pointer-events:none;}

/* ── FLOATING HEARTS ── */
.fheart{position:fixed;pointer-events:none;z-index:9999;font-size:1.6rem;animation:fh 2.4s ease forwards;}
@keyframes fh{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-220px) scale(0.4);}}

/* ════════════════════════════════
   MOBILE — all sizes up to 768px
   Uses dvh for correct mobile height
   ════════════════════════════════ */
@media(max-width:768px){

  body,
  .screen{height:100dvh;}

  /* ── Screen 1: stack image on top, keypad below ── */
  #s1{flex-direction:column;overflow-y:auto;}
  .s1-left{
    flex:0 0 auto;
    width:100%;
    min-height:38dvh;
    padding:16px 0 10px;
  }
  .oval-wrap{width:130px;height:158px;}
  .oval-frame{width:120px;height:144px;}
  .s1-right{
    flex:1 1 auto;width:100%;
    padding:10px 16px 20px;gap:10px;
  }
  .pc-label{font-size:1.25rem;}
  .pc-box{width:40px;height:40px;font-size:1.2rem;}
  .keypad{width:160px;gap:7px;}
  .key{height:44px;font-size:1rem;}
  .unlock-btn{padding:9px 32px;font-size:0.9rem;}

  /* ── All slide screens: scroll if content overflows ── */
  .slide{
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    justify-content:flex-start;
    padding-top:max(20px, 5dvh);
    gap:clamp(10px,2.5vh,18px);
  }

  /* ── Text sizes ── */
  .big-red{font-size:clamp(1.7rem,6.5vw,2.4rem);}
  .action-btn{padding:13px 32px;font-size:1rem;}
  .yn-row{gap:12px;}

  /* ── SVGs: never taller than 30% of screen ── */
  .slide svg, #s7 svg, #s8 svg{
    max-width:85vw;
    max-height:30dvh;
    width:auto;
    height:auto;
    flex-shrink:0;
  }

  /* ── Screen 6: wish scroll ── */
  .wish-scroll{padding:16px 18px 90px;}
  .wish-title{font-size:clamp(1.7rem,6vw,2.4rem);}
  .wish-body{font-size:clamp(1.15rem,4.5vw,1.4rem);line-height:2;}

  /* ── Screen 8 ── */
  #s8{gap:12px;padding:16px 14px;}
  #s8 .big-red{font-size:clamp(1.7rem,6.5vw,2.4rem);}
}

/* Extra small phones (< 380px wide) */
@media(max-width:380px){
  .pc-box{width:36px;height:36px;font-size:1rem;}
  .keypad{width:148px;gap:6px;}
  .key{height:40px;font-size:0.95rem;}
  .slide svg,#s7 svg,#s8 svg{max-height:26dvh;}
  .big-red{font-size:clamp(1.4rem,6vw,2rem);}
}
</style>
</head>
<body>

<!-- ━━━━━ SCREEN 1 — PASSCODE ━━━━━ -->
<div class="screen active" id="s1">
  <div class="s1-left">
    <div class="scatter" id="scatter"></div>
    <div class="oval-wrap">
      <div class="heart-ring" id="heartRing"></div>
      <div class="oval-frame">
        <!-- cute cat image as default — no upload button shown -->
        <svg width="200" height="240" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
          <rect width="200" height="240" fill="#fff0f5"/>
          <!-- body -->
          <ellipse cx="100" cy="190" rx="60" ry="45" fill="#ffb6c1"/>
          <!-- head -->
          <circle cx="100" cy="130" r="55" fill="#ffb6c1"/>
          <!-- ears -->
          <polygon points="62,82 46,48 82,76" fill="#ffb6c1"/>
          <polygon points="138,82 154,48 118,76" fill="#ffb6c1"/>
          <polygon points="64,79 52,56 78,74" fill="#ff85a1"/>
          <polygon points="136,79 148,56 122,74" fill="#ff85a1"/>
          <!-- face -->
          <path d="M83 128 Q88 122 93 128" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <path d="M107 128 Q112 122 117 128" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" fill="none"/>
          <ellipse cx="82" cy="138" rx="11" ry="7" fill="#ff85a1" opacity="0.45"/>
          <ellipse cx="118" cy="138" rx="11" ry="7" fill="#ff85a1" opacity="0.45"/>
          <ellipse cx="100" cy="138" rx="5" ry="4" fill="#e91e8c"/>
          <path d="M95 143 Q100 149 105 143" stroke="#e91e8c" stroke-width="2" stroke-linecap="round" fill="none"/>
          <!-- hearts on head -->
          <text x="76" y="100" font-size="14" fill="#e91e8c">❤</text>
          <text x="100" y="92" font-size="10" fill="#f48fb1">❤</text>
          <text x="118" y="100" font-size="14" fill="#e91e8c">❤</text>
          <!-- belly -->
          <ellipse cx="100" cy="195" rx="35" ry="28" fill="#ffd6e0" opacity="0.7"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="s1-right">
    <div class="pc-label">Enter a passcode</div>
    <div class="pc-boxes">
      <div class="pc-box" id="b0"></div>
      <div class="pc-box" id="b1"></div>
      <div class="pc-box" id="b2"></div>
      <div class="pc-box" id="b3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="kp('1')">1</button>
      <button class="key" onclick="kp('2')">2</button>
      <button class="key" onclick="kp('3')">3</button>
      <button class="key" onclick="kp('4')">4</button>
      <button class="key" onclick="kp('5')">5</button>
      <button class="key" onclick="kp('6')">6</button>
      <button class="key" onclick="kp('7')">7</button>
      <button class="key" onclick="kp('8')">8</button>
      <button class="key" onclick="kp('9')">9</button>
      <button class="key" onclick="kp('*')">✱</button>
      <button class="key" onclick="kp('0')">0</button>
      <button class="key" onclick="kp('#')">#</button>
    </div>
    <button class="unlock-btn" id="unlockBtn" onclick="checkCode()">UNLOCK</button>
  </div>
</div>

<!-- ━━━━━ SCREEN 2 — WRONG PASSCODE ━━━━━ -->
<div class="screen slide" id="s2">
  <div class="glow"></div>
  <div class="big-red">WRONG PASSCODE!</div>

  <!-- Wrong passcode: green blob lying + teal blob sitting, like screenshots -->
  <svg width="240" height="150" viewBox="0 0 240 150" style="animation:bounce 1.3s ease-in-out infinite">
    <!-- LEFT: green blob lying flat/sad -->
    <!-- flat body -->
    <ellipse cx="68" cy="118" rx="56" ry="24" fill="#7bc67e"/>
    <!-- round head sitting on body -->
    <circle cx="52" cy="88" r="34" fill="#7bc67e"/>
    <!-- left ear -->
    <ellipse cx="36" cy="58" rx="9" ry="15" fill="#7bc67e" transform="rotate(-18 36 58)"/>
    <!-- right ear -->
    <ellipse cx="66" cy="55" rx="9" ry="15" fill="#7bc67e" transform="rotate(12 66 55)"/>
    <!-- sad curved down eyes -->
    <path d="M36 85 Q43 92 50 85" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M52 83 Q59 90 66 83" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- pink blush dots -->
    <circle cx="36" cy="95" r="6" fill="#f48fb1" opacity="0.55"/>
    <!-- tiny dot nose -->
    <circle cx="52" cy="95" r="3" fill="#e91e8c"/>
    <!-- teardrop -->
    <ellipse cx="37" cy="103" rx="3.5" ry="6" fill="#90caf9" opacity="0.85"/>

    <!-- RIGHT: teal blob sitting upright sad -->
    <ellipse cx="172" cy="122" rx="46" ry="24" fill="#4db6bc"/>
    <circle cx="172" cy="84" r="36" fill="#4db6bc"/>
    <!-- ears -->
    <ellipse cx="154" cy="52" rx="9" ry="16" fill="#4db6bc" transform="rotate(-14 154 52)"/>
    <ellipse cx="190" cy="50" rx="9" ry="16" fill="#4db6bc" transform="rotate(14 190 50)"/>
    <!-- sad down eyes -->
    <path d="M156 82 Q163 89 170 82" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M172 80 Q179 87 186 80" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- blush -->
    <circle cx="157" cy="93" r="6" fill="#f48fb1" opacity="0.55"/>
    <!-- nose -->
    <circle cx="172" cy="93" r="3" fill="#e91e8c"/>
  </svg>

  <button class="action-btn" onclick="goTo('s1')">TRY AGAIN</button>
</div>

<!-- ━━━━━ SCREEN 3 — YES / NO ━━━━━ -->
<div class="screen slide" id="s3">
  <div class="glow"></div>
  <div class="big-red">I made something special for u<br>do u wanna see it? 🫶</div>

  <!-- Two birds in a box matching screenshot exactly -->
  <svg width="240" height="160" viewBox="0 0 240 160" style="animation:bounce 2s ease-in-out infinite">
    <!-- wooden box -->
    <rect x="25" y="108" width="190" height="50" rx="10" fill="#d4a843"/>
    <rect x="25" y="108" width="190" height="18" rx="8" fill="#b8891f"/>
    <line x1="120" y1="108" x2="120" y2="158" stroke="#b8891f" stroke-width="3"/>
    <!-- LEFT bird: teal round blob -->
    <ellipse cx="78" cy="118" rx="38" ry="32" fill="#4db6bc"/>
    <circle cx="78" cy="80" r="34" fill="#4db6bc"/>
    <!-- ear nubs small and round on top -->
    <circle cx="60" cy="52" r="12" fill="#4db6bc"/>
    <circle cx="96" cy="50" r="12" fill="#4db6bc"/>
    <!-- big cute eye (left bird faces right slightly) -->
    <circle cx="70" cy="78" r="9" fill="white"/>
    <circle cx="71" cy="79" r="5.5" fill="#222"/>
    <circle cx="72" cy="77" r="2" fill="white"/>
    <!-- tiny beak -->
    <ellipse cx="88" cy="86" rx="6" ry="4" fill="#f4a53f" transform="rotate(20 88 86)"/>
    <!-- blush -->
    <circle cx="60" cy="90" r="8" fill="#f48fb1" opacity="0.45"/>
    <!-- hearts between -->
    <text x="104" y="68" font-size="16" fill="#e91e8c">❤</text>
    <text x="108" y="50" font-size="11" fill="#f48fb1">❤</text>

    <!-- RIGHT bird: slightly lighter teal -->
    <ellipse cx="162" cy="118" rx="38" ry="32" fill="#5ecec8"/>
    <circle cx="162" cy="80" r="34" fill="#5ecec8"/>
    <circle cx="144" cy="52" r="12" fill="#5ecec8"/>
    <circle cx="180" cy="50" r="12" fill="#5ecec8"/>
    <!-- eye faces left -->
    <circle cx="154" cy="78" r="9" fill="white"/>
    <circle cx="155" cy="79" r="5.5" fill="#222"/>
    <circle cx="156" cy="77" r="2" fill="white"/>
    <!-- tiny beak left side -->
    <ellipse cx="146" cy="86" rx="6" ry="4" fill="#f4a53f" transform="rotate(-20 146 86)"/>
    <!-- blush -->
    <circle cx="176" cy="90" r="8" fill="#f48fb1" opacity="0.45"/>
  </svg>

  <div class="yn-row">
    <button class="action-btn" onclick="goTo('s5')">YES</button>
    <button class="action-btn grey" onclick="goTo('s4')">NO</button>
  </div>
</div>

<!-- ━━━━━ SCREEN 4 — WHY DID U CLICK NO ━━━━━ -->
<div class="screen slide" id="s4">
  <div class="glow"></div>
  <div class="big-red">Why did u click no!?</div>

  <!-- Two teal blobs confused — matching screenshot -->
  <svg width="240" height="150" viewBox="0 0 240 150" style="animation:bounce 1.5s ease-in-out infinite">
    <!-- LEFT teal blob: closed happy-but-confused eyes -->
    <ellipse cx="72" cy="120" rx="48" ry="26" fill="#4db6bc"/>
    <circle cx="72" cy="82" r="36" fill="#4db6bc"/>
    <circle cx="54" cy="52" r="12" fill="#4db6bc"/>
    <circle cx="90" cy="50" r="12" fill="#4db6bc"/>
    <!-- squiggly/closed eyes (confused) -->
    <path d="M55 80 Q63 74 71 80" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <path d="M72 78 Q80 72 88 78" stroke="#444" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- blush -->
    <circle cx="55" cy="91" r="7" fill="#f48fb1" opacity="0.5"/>
    <circle cx="72" cy="91" r="3" fill="#e91e8c"/>
    <!-- ?? -->
    <text x="88" y="56" font-size="20" fill="#c2185b" font-weight="bold" font-family="Nunito,sans-serif">??</text>

    <!-- RIGHT teal blob: flat grumpy lines for eyes -->
    <ellipse cx="170" cy="120" rx="48" ry="26" fill="#5ecec8"/>
    <circle cx="170" cy="82" r="36" fill="#5ecec8"/>
    <circle cx="152" cy="52" r="12" fill="#5ecec8"/>
    <circle cx="188" cy="50" r="12" fill="#5ecec8"/>
    <!-- flat grumpy line eyes -->
    <line x1="155" y1="77" x2="172" y2="77" stroke="#444" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="155" y1="85" x2="172" y2="83" stroke="#444" stroke-width="3.2" stroke-linecap="round"/>
    <!-- blush -->
    <circle cx="155" cy="92" r="7" fill="#f48fb1" opacity="0.5"/>
    <circle cx="170" cy="91" r="3" fill="#e91e8c"/>
  </svg>

  <button class="action-btn" onclick="goTo('s3')">TRY AGAIN</button>
</div>

<!-- ━━━━━ SCREEN 5 — HAPPY BIRTHDAY ━━━━━ -->
<div class="screen slide" id="s5">
  <div class="glow"></div>
  <div style="font-size:1.2rem;letter-spacing:4px;position:relative;z-index:1;">⭐🎉⭐</div>
  <div class="big-red" style="font-size:clamp(2.2rem,6vw,3.8rem);" id="hbName">HAPPY BIRTHDAY</div>

  <!-- Birthday scene: grey blob + brown bear + teal blob + cake — matching screenshot -->
  <svg width="340" height="178" viewBox="0 0 340 178" style="animation:bounce 2.2s ease-in-out infinite;position:relative;z-index:1;">
    <!-- scattered confetti -->
    <circle cx="30" cy="40" r="5" fill="#f48fb1"/><circle cx="310" cy="35" r="4" fill="#4db6bc"/>
    <circle cx="70" cy="20" r="4" fill="#ffd54f"/><circle cx="270" cy="22" r="4" fill="#ce93d8"/>
    <circle cx="150" cy="12" r="3" fill="#e91e8c"/><circle cx="195" cy="14" r="3" fill="#7ecac8"/>
    <text x="12" y="55" font-size="15">⭐</text><text x="306" y="58" font-size="15">⭐</text>
    <text x="4" y="88" font-size="12">✨</text><text x="320" y="82" font-size="12">✨</text>
    <text x="130" y="8" font-size="11">✨</text><text x="200" y="10" font-size="11">✨</text>

    <!-- LEFT: small grey blob with purple hat -->
    <ellipse cx="48" cy="160" rx="32" ry="18" fill="#90a4ae"/>
    <circle cx="48" cy="132" r="26" fill="#90a4ae"/>
    <circle cx="34" cy="110" r="10" fill="#90a4ae"/>
    <circle cx="62" cy="108" r="10" fill="#90a4ae"/>
    <!-- purple hat -->
    <polygon points="48,95 30,118 66,118" fill="#ba68c8"/>
    <ellipse cx="48" cy="118" rx="18" ry="7" fill="#9c27b0"/>
    <circle cx="48" cy="95" r="5" fill="#ffd54f"/>

/* ╔══════════════════════════════════════════════════════════════╗

const CONFIG = {

  // 1️⃣  THEIR NAME — shown on Happy Birthday screen
  name: "Aleeza",

  // 2️⃣  PASSCODE — 4 digits they must enter to unlock
  passcode: "3006",

  // 3️⃣  DATE — shown on the last screen (format: DD.MM.YYYY)
  date: "30.06.2010",

  // 4️⃣  YOUR WISH MESSAGE — each line is a new paragraph
  wishLines: [
    "Happiest baby baby 🎂 💝",
    "I wish may god bless you with all the happiness and success in your life",
    "May you always be the happiest person and even keep ppl around in the happiest",
    "Hope this year brings you more joy and you get what you have been praying for",
    "You are the most beautiful part of my life",
    "You are my comfort person",
    "You make me the happiest and annoy me too 😄",
    "Thank you for always being in my life, understanding me and always listening to me",
    "Thank you for staying in my life, understanding me and always listening to me",
    "Thank uh for always being for me to try for all the efforts, love and care uh have shown",
    "Thank uh for adding happy moments in my life 🌸",
    "once again happiest birthday Princess 🎀",
    "May we celebrate all our baby's in life together",
  ],

  // 5️⃣  SIGN OFF — shown at the bottom of the wish letter
  signOff: "Forever Your's 💕",

};

/* ╚══════════════════════════════════════════════════════════════╝
   ║  DO NOT EDIT ANYTHING BELOW THIS LINE                       ║
   ╚══════════════════════════════════════════════════════════════ */

// ── Apply config to page ──
document.title = `🎀 Happy Birthday ${CONFIG.name}!`;

// Name on happy birthday screen
document.getElementById('hbName').textContent = `HAPPY BIRTHDAY ${CONFIG.name}`;

// Date on last screen
document.getElementById('dateLabel').textContent = `${CONFIG.date} 💕`;

// Build wish message
const wishBody = document.getElementById('wishBody');
CONFIG.wishLines.forEach(line => {
  const p = document.createElement('p');
  p.textContent = line;
  wishBody.appendChild(p);
});
const signEl = document.createElement('p');
signEl.className = 'rb';
signEl.textContent = CONFIG.signOff;
wishBody.appendChild(signEl);

// ── PASSCODE ──
let entered = '';

function kp(k) {
  if (entered.length >= 4) return;
  entered += k;
  render();
  if (entered.length === 4) document.getElementById('unlockBtn').style.display = 'block';
}

function render() {
  ['b0','b1','b2','b3'].forEach((id,i) => {
    const b = document.getElementById(id);
    b.textContent = i < entered.length ? '✱' : '';
    b.className = 'pc-box' + (i < entered.length ? ' on' : '');
  });
}

function checkCode() {
  if (entered === CONFIG.passcode) {
    entered = ''; render();
    document.getElementById('unlockBtn').style.display = 'none';
    goTo('s3');
  } else {
    entered = ''; render();
    document.getElementById('unlockBtn').style.display = 'none';
    goTo('s2');
  }
}

// ── NAVIGATION ──
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if (id === 's6') initWish();
}

// ── WISH SCROLL ──
function initWish() {
  const btn = document.getElementById('wishNextBtn');
  const scroll = document.getElementById('wishScroll');
  btn.style.display = 'block';
  const check = () => {
    btn.style.opacity = scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 50 ? '1' : '0.45';
  };
  scroll.addEventListener('scroll', check);
  check();
}

// ── HEARTS RAIN ──
const emojis = ['💕','💗','💖','❤️','💝','🌸','✨','🎀','💞'];
function rainHearts() {
  for (let i = 0; i < 25; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'fheart';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 92 + 'vw';
      h.style.top = (25 + Math.random() * 55) + 'vh';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 2700);
    }, i * 80);
  }
}

// ── SCATTER (screen 1 left) ──
const sc = document.getElementById('scatter');
const items = ['★','♥','★','♥','✦'];
for (let i = 0; i < 35; i++) {
  const s = document.createElement('span');
  s.textContent = items[i % items.length];
  s.style.top = Math.random() * 94 + '%';
  s.style.left = Math.random() * 94 + '%';
  s.style.fontSize = (10 + Math.random() * 10) + 'px';
  sc.appendChild(s);
}

// ── HEART RING (around oval) ──
const ring = document.getElementById('heartRing');
const total = 30;
for (let i = 0; i < total; i++) {
  const s = document.createElement('span');
  s.textContent = i % 2 === 0 ? '♥' : '✦';
  const angle = (i * 360 / total) * Math.PI / 180;
  const r = 138;
  const x = 50 + r * Math.cos(angle - Math.PI/2);
  const y = 50 + r * Math.sin(angle - Math.PI/2);
  s.style.cssText = `position:absolute;top:${y}%;left:${x}%;transform:translate(-50%,-50%);font-size:11px;color:#e91e8c;opacity:0.6;`;
  ring.appendChild(s);
}

// ── STAR BG screen 8 ──
const sb = document.getElementById('starBg');
[[8,12],[85,18],[5,72],[90,68],[50,8],[15,45],[78,50],[40,85],[25,30],[70,25]].forEach(([x,y]) => {
